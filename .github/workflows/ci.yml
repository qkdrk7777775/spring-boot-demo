name: CI
on: [push]
jobs:
  build:
    # runs-on: ubuntu-latest
    runs-on: self-host
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Print message
        run: echo "Hello, DevOps!"

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build with Maven 
        run: mvn -B package --file pom.xml

      - name: Build Docker image
        # 현재 디렉토리의 Dockerfile로 이미지 빌드
        run: docker build -t myapp:${{github.sha}} -f ./Dockerfile.multi .

      - name: Push to Docker Hub
        run: |
         echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
         docker build -t ${{ secrets.DOCKER_USER }}/myapp:${{ github.sha }} .
         docker push ${{ secrets.DOCKER_USER }}/myapp:${{ github.sha }}                                                         
         docker tag ${{ secrets.DOCKER_USER }}/myapp:${{ github.sha }} ${{ secrets.DOCKER_USER }}/myapp:latest
         docker push ${{ secrets.DOCKER_USER }}/myapp:latest
